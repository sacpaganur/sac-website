<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="மெய்நிகர் செபமாலை - புனித அந்தோணியார் ஆலயம் | Interactive Virtual Rosary - St. Antony's Church.">
    <title>மெய்நிகர் செபமாலை | Virtual Rosary</title>
    
    <!-- Google Fonts & Icon Sets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+Tamil:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- Custom Stylesheets -->
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link rel="stylesheet" href="css/rosary.css?v=1.0">
    <script src="js/navbar.js?v=1.7"></script>
</head>
<body class="rosary-light-theme">
    <!-- Navigation Header -->
    <div id="global-navbar"></div>

    <main class="rosary-main-container">
        <!-- Header / Status -->
        <header class="rosary-header">
            <h1 class="rosary-title" data-i18n="rosary.title">மெய்நிகர் செபமாலை</h1>
            <div class="rosary-mystery-badge" id="mystery-badge">Loading...</div>
            <div class="rosary-progress">
                <span id="bead-counter">0/53</span> 
                <span data-i18n="rosary.beads">Beads</span>
            </div>
        </header>

        <!-- Interactive Tap Area -->
        <div class="rosary-tap-zone" id="rosary-tap-zone">
            <!-- Visual Rosary Ring -->
            <div class="rosary-visual-ring">
                <div class="rosary-glowing-bead" id="active-bead"></div>
            </div>

            <!-- Current Prayer Text -->
            <div class="rosary-text-container">
                <h2 class="prayer-title" id="prayer-title">Sign of the Cross</h2>
                <p class="prayer-content" id="prayer-content">In the name of the Father, and of the Son, and of the Holy Spirit. Amen.</p>
                <div class="prayer-instruction" id="prayer-instruction" data-i18n="rosary.instruction">Tap anywhere to begin</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="rosary-controls">
            <button class="rosary-btn" id="btn-restart">
                <span class="material-icons">restart_alt</span>
            </button>
            <button class="rosary-btn primary" id="btn-prev">
                <span class="material-icons">chevron_left</span>
            </button>
            <button class="rosary-btn primary" id="btn-next">
                <span class="material-icons">chevron_right</span>
            </button>
        </div>
    </main>

    <!-- Global Footer -->
    <div id="global-footer"></div>

    <!-- Script imports -->
    <script src="js/database.js?v=1.3" defer></script>
    <script src="js/common.js?v=1.9" defer></script>
    <script src="js/footer.js?v=1.1" defer></script>
    <script src="js/rosary.js?v=1.5" defer></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Force dark theme on this page specifically via body class .rosary-zen-mode
            await SAC_COMMON.init('rosary');
            SAC_COMMON.revealPage();
        });
    </script>
</body>
</html>
