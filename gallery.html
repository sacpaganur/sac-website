<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="புகைப்பட தொகுப்பு - புனித அந்தோணியார் ஆலயம் | Beautiful photograph gallery showcasing sanctuary altar, feast festivals, and parish life of St. Antony's Parish in Vadakku Paganur.">
    <title>ஆலய புகைப்படங்கள் | புனித அந்தோணியார் ஆலயம் – வடக்கு பாகனூர்</title>
    <meta name="view-transition" content="same-origin" />
    
    <!-- Google Fonts & Icon Sets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+Tamil:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- Custom Light Stylesheet -->
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link rel="stylesheet" href="css/gallery-page.css?v=1.1">
    <script src="js/navbar.js?v=1.7"></script>
</head>
<body>
    <!-- Global Page Loader -->
    <style id="sac-loader-scroll">body { overflow: hidden !important; }</style>
    <div id="sac-global-loader" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-glass, rgba(255,255,255,0.95)); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); z-index:999999; display:flex; flex-direction:column; justify-content:center; align-items:center; transition: opacity 0.3s ease-in-out, visibility 0.3s ease-in-out;">
      <div style="position:relative; width:70px; height:70px;">
        <div style="position:absolute; width:100%; height:100%; border:3px solid var(--border-glass, #f3f4f6); border-top-color:var(--primary, #8b5cf6); border-radius:50%; animation:sacSpin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;"></div>
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); font-size:1.6rem; opacity:0.8;">⛪</div>
      </div>
      <div style="margin-top:20px; font-weight:800; color:var(--primary, #8b5cf6); letter-spacing:2px; font-size: 0.9rem; font-family:'Inter', sans-serif; animation:sacPulse 1.5s ease-in-out infinite;">LOADING</div>
      <style>
        @keyframes sacSpin { to { transform: rotate(360deg); } }
        @keyframes sacPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      </style>
    </div>


    <!-- Navigation Header -->
    <div id="global-navbar"></div>

    

    <!-- Main Content wrapper -->
    <main class="main-wrapper">
        <section class="notices-hero-header">
            <div class="notices-hero-inner">
                <div class="notices-liturgical-badge" id="gallery-hero-badge">
                    <span>📷</span>
                    <span id="gallery-hero-badge-text">ஆலய புகைப்பட தொகுப்பு</span>
                </div>
                <h2 class="notices-hero-title" id="gallery-title-label">ஆலய புகைப்படங்கள்</h2>
                <p class="notices-hero-subtitle" id="gallery-subtitle-label">வடக்கு பாகனூர் புனித அந்தோணியார் ஆலயத்தின் அழகிய திருத்தலப் புகைப்படங்கள்.</p>
                <div class="notices-hero-counter" id="gallery-counter-badge">
                    <span class="counter-number" id="gallery-count-number">0</span>
                    <span id="gallery-count-label">புகைப்படங்கள்</span>
                </div>
            </div>
        </section>

        <div class="gallery-page-body">
            <div class="gallery-page-inner">
                <!-- Current Trending -->
                <section class="gallery-trending-section" id="gallery-trending-section" hidden>
                    <div class="gallery-section-head">
                        <span class="gallery-trending-badge" id="gallery-trending-badge-label">🔥 தற்போதைய பிரபலம்</span>
                        <h2 class="gallery-section-title" id="gallery-trending-title">Current Trending</h2>
                    </div>
                    <div class="gallery-trending-row" id="gallery-trending-row"></div>
                </section>

                <!-- Category filters -->
                <div class="gallery-filter-wrap">
                    <div class="gallery-filter-bar" id="gallery-filter-tabs" role="tablist"></div>
                </div>

                <!-- All photos grid -->
                <section class="gallery-grid-section">
                    <div class="gallery-section-head">
                        <h2 class="gallery-section-title" id="gallery-all-title">அனைத்து புகைப்படங்கள்</h2>
                    </div>
                    <div class="gallery-grid" id="gallery-grid-feed">
                        <div class="gallery-loading" id="gallery-loading-msg">புகைப்படங்கள் ஏற்றப்படுகின்றன... / Loading photos...</div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Custom Lightbox Overlay -->
    <div class="lightbox-overlay" id="lightbox-overlay" onclick="closeLightbox(event)">
        <div class="lightbox-container" onclick="event.stopPropagation()">
            <button class="lightbox-btn btn-close" onclick="closeLightboxOverlay()">
                <span class="material-icons">close</span>
            </button>
            <button class="lightbox-btn btn-prev" onclick="prevImage()">
                <span class="material-icons">arrow_back</span>
            </button>
            <button class="lightbox-btn btn-next" onclick="nextImage()">
                <span class="material-icons">arrow_forward</span>
            </button>
            <img src="" class="lightbox-img" id="lightbox-img" alt="Lightbox Image">
            <div class="lightbox-caption">
                <div class="lightbox-cat" id="lightbox-cat">Category</div>
                <div class="lightbox-title" id="lightbox-title">Title Text</div>
                <div class="lightbox-counter" id="lightbox-counter"></div>
            </div>
        </div>
    </div>

    <footer class="footer" id="global-footer"></footer>

    <!-- Firebase compatibility libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>

    <!-- Core Script dependencies -->
    <script src="js/database.js?v=3"></script>
    <script src="js/footer.js?v=1.1"></script>
    <script src="js/common.js?v=1.7"></script>

    <script>
        let galleryData = [];
        let currentIndex = 0;
        let activeCategory = 'all';
        let lightboxList = [];

        const CATEGORY_ICONS = {
            'patron saint devotion': '🙏',
            'historical sanctuary': '🏛️',
            'new church building': '⛪',
            'sanctuary altar': '🕯️',
            'annual festival': '🎉',
            'parish liturgical choir': '🎵'
        };

        window.addEventListener('DOMContentLoaded', async () => {
            await SAC_COMMON.init('gallery');
            await loadDynamicGallery();
            translateGalleryLabels();
            SAC_COMMON.revealPage();

            window.addEventListener('sacLanguageChanged', () => {
                translateGalleryLabels();
                renderGalleryPage();
                if (document.getElementById('lightbox-overlay').classList.contains('open')) {
                    updateLightboxContent();
                }
            });

            window.addEventListener('sacDataRefreshed', async (e) => {
                if (e.detail && e.detail.collection === 'gallery') {
                    await loadDynamicGallery();
                }
            });
        });

        async function loadDynamicGallery() {
            try {
                const allGallery = await SAC_DATABASE.get("gallery") || [];
                galleryData = allGallery.filter(g => g.isActive !== false);
                renderGalleryPage();
            } catch (err) {
                console.error("Failed to load gallery:", err);
            }
        }

        function getTrendingItems() {
            const marked = galleryData.filter(item => item.trending);
            if (marked.length > 0) return marked.slice(0, 3);
            return galleryData.slice(0, 3);
        }

        function getUniqueCategories() {
            const seen = new Set();
            const cats = [];
            galleryData.forEach(item => {
                const key = (item.catEn || '').trim();
                if (key && !seen.has(key)) {
                    seen.add(key);
                    cats.push(key);
                }
            });
            return cats;
        }

        function getCategoryIcon(catEn) {
            const key = (catEn || '').toLowerCase().trim();
            return CATEGORY_ICONS[key] || '📷';
        }

        function getFilteredItems() {
            if (activeCategory === 'all') return galleryData;
            return galleryData.filter(item => (item.catEn || '').trim() === activeCategory);
        }

        function findGlobalIndex(item) {
            return galleryData.findIndex(g => g.id === item.id);
        }

        function renderGalleryPage() {
            updatePhotoCount();
            renderTrending();
            renderFilterTabs();
            renderGrid();
        }

        function updatePhotoCount() {
            const countEl = document.getElementById('gallery-count-number');
            if (countEl) countEl.innerText = String(galleryData.length);
        }

        function renderTrending() {
            const section = document.getElementById('gallery-trending-section');
            const row = document.getElementById('gallery-trending-row');
            if (!section || !row) return;

            const trending = getTrendingItems();
            if (galleryData.length === 0 || trending.length === 0) {
                section.hidden = true;
                return;
            }

            section.hidden = false;
            const isTa = SAC_COMMON.currentLang === 'ta';
            const hotLabel = isTa ? 'பிரபலம்' : 'Trending';

            row.innerHTML = trending.map(item => {
                const idx = findGlobalIndex(item);
                const category = isTa ? item.catTa : item.catEn;
                const title = isTa ? item.titleTa : item.titleEn;
                return `
                    <article class="gallery-trending-card" onclick="openLightbox(${idx})" role="button" tabindex="0" aria-label="${title}">
                        <img src="${item.src}" alt="${title}" loading="lazy">
                        <div class="gallery-trending-overlay">
                            <span class="gallery-trending-hot">🔥 ${hotLabel}</span>
                            <span class="gallery-trending-cat">${category}</span>
                            <h3 class="gallery-trending-title">${title}</h3>
                        </div>
                    </article>
                `;
            }).join('');
        }

        function renderFilterTabs() {
            const container = document.getElementById('gallery-filter-tabs');
            if (!container) return;

            const isTa = SAC_COMMON.currentLang === 'ta';
            const allLabel = isTa ? 'அனைத்தும்' : 'All';
            const categories = getUniqueCategories();

            const tabs = [
                { key: 'all', label: allLabel, icon: '🌟' },
                ...categories.map(cat => ({
                    key: cat,
                    label: isTa
                        ? (galleryData.find(g => g.catEn === cat)?.catTa || cat)
                        : cat,
                    icon: getCategoryIcon(cat)
                }))
            ];

            container.innerHTML = tabs.map(tab => `
                <button type="button" class="gallery-filter-tab${activeCategory === tab.key ? ' active' : ''}"
                    data-category="${tab.key.replace(/"/g, '&quot;')}" role="tab"
                    aria-selected="${activeCategory === tab.key}">
                    <span class="tab-icon">${tab.icon}</span>
                    <span class="tab-label">${tab.label}</span>
                </button>
            `).join('');

            container.querySelectorAll('.gallery-filter-tab').forEach(btn => {
                btn.addEventListener('click', () => {
                    activeCategory = btn.getAttribute('data-category');
                    renderFilterTabs();
                    renderGrid();
                    translateGalleryLabels();
                });
            });
        }

        function renderGrid() {
            const container = document.getElementById('gallery-grid-feed');
            if (!container) return;

            const filtered = getFilteredItems();
            const isTa = SAC_COMMON.currentLang === 'ta';

            if (galleryData.length === 0) {
                container.innerHTML = `
                    <div class="gallery-empty">
                        <span class="material-icons">photo_library</span>
                        <span>${isTa ? 'புகைப்படங்கள் எதுவும் இல்லை' : 'No photos found'}</span>
                    </div>
                `;
                return;
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="gallery-empty">
                        <span class="material-icons">filter_none</span>
                        <span>${isTa ? 'இந்த வகையில் புகைப்படங்கள் இல்லை' : 'No photos in this category'}</span>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map((item, i) => {
                const idx = findGlobalIndex(item);
                const category = isTa ? item.catTa : item.catEn;
                const title = isTa ? item.titleTa : item.titleEn;
                return `
                    <article class="gallery-card" style="animation-delay:${Math.min(i * 0.05, 0.35)}s"
                        onclick="openLightbox(${idx})" role="button" tabindex="0">
                        <div class="gallery-img-wrapper">
                            <img src="${item.src}" class="gallery-img" alt="${title}" loading="lazy">
                            <span class="gallery-zoom-hint material-icons" aria-hidden="true">zoom_in</span>
                        </div>
                        <div class="gallery-card-info">
                            <span class="gallery-card-category">${category}</span>
                            <h3 class="gallery-card-title">${title}</h3>
                        </div>
                    </article>
                `;
            }).join('');
        }

        function translateGalleryLabels() {
            const isTa = SAC_COMMON.currentLang === 'ta';

            const badgeText = document.getElementById('gallery-hero-badge-text');
            if (badgeText) badgeText.innerText = isTa ? 'ஆலய புகைப்பட தொகுப்பு' : 'Parish Photo Collection';

            const titleLbl = document.getElementById('gallery-title-label');
            if (titleLbl) titleLbl.innerText = isTa ? 'ஆலய புகைப்படங்கள்' : 'Parish Photo Gallery';

            const subtitleLbl = document.getElementById('gallery-subtitle-label');
            if (subtitleLbl) {
                subtitleLbl.innerText = isTa
                    ? 'வடக்கு பாகனூர் புனித அந்தோணியார் ஆலயத்தின் அழகிய திருத்தலப் புகைப்படங்கள்.'
                    : 'Beautiful snapshots of our sanctuary, feast celebrations, and parish life.';
            }

            const countLabel = document.getElementById('gallery-count-label');
            if (countLabel) countLabel.innerText = isTa ? 'புகைப்படங்கள்' : 'Photos';

            const trendingBadge = document.getElementById('gallery-trending-badge-label');
            if (trendingBadge) trendingBadge.innerText = isTa ? '🔥 தற்போதைய பிரபலம்' : '🔥 Current Trending';

            const trendingTitle = document.getElementById('gallery-trending-title');
            if (trendingTitle) trendingTitle.innerText = isTa ? 'பிரபலமான புகைப்படங்கள்' : 'Featured Highlights';

            const sectionTitle = document.getElementById('gallery-all-title');
            if (sectionTitle) {
                if (activeCategory === 'all') {
                    sectionTitle.innerText = isTa ? 'அனைத்து புகைப்படங்கள்' : 'All Photos';
                } else {
                    const firstMatch = galleryData.find(g => (g.catEn || '').trim() === activeCategory);
                    if (firstMatch) {
                        sectionTitle.innerText = isTa ? firstMatch.catTa : firstMatch.catEn;
                    } else {
                        sectionTitle.innerText = activeCategory;
                    }
                }
            }

            const copyrightLabel = document.getElementById('footer-church-name-copyright');
            if (copyrightLabel) {
                copyrightLabel.innerText = isTa ? 'புனித அந்தோணியார் ஆலயம், வடக்கு பாகனூர்' : "St. Antony's Church, Vadakku Paganur";
            }
        }

        function openLightbox(index) {
            currentIndex = index;
            lightboxList = galleryData;

            const overlay = document.getElementById('lightbox-overlay');
            overlay.classList.add('open');
            updateLightboxContent();
            document.body.style.overflow = 'hidden';
        }

        function closeLightboxOverlay() {
            document.getElementById('lightbox-overlay').classList.remove('open');
            document.body.style.overflow = '';
        }

        function closeLightbox() {
            closeLightboxOverlay();
        }

        function updateLightboxContent() {
            if (!lightboxList.length) return;
            const item = lightboxList[currentIndex];
            const isTa = SAC_COMMON.currentLang === 'ta';

            document.getElementById('lightbox-img').src = item.src;
            document.getElementById('lightbox-cat').innerText = isTa ? item.catTa : item.catEn;
            document.getElementById('lightbox-title').innerText = isTa ? item.titleTa : item.titleEn;

            const counter = document.getElementById('lightbox-counter');
            if (counter) {
                counter.innerText = isTa
                    ? `${currentIndex + 1} / ${lightboxList.length}`
                    : `Photo ${currentIndex + 1} of ${lightboxList.length}`;
            }
        }

        function nextImage() {
            if (!lightboxList.length) return;
            currentIndex = (currentIndex + 1) % lightboxList.length;
            updateLightboxContent();
        }

        function prevImage() {
            if (!lightboxList.length) return;
            currentIndex = (currentIndex - 1 + lightboxList.length) % lightboxList.length;
            updateLightboxContent();
        }

        document.addEventListener('keydown', (e) => {
            const overlay = document.getElementById('lightbox-overlay');
            if (!overlay || !overlay.classList.contains('open')) return;
            if (e.key === 'ArrowRight') nextImage();
            else if (e.key === 'ArrowLeft') prevImage();
            else if (e.key === 'Escape') closeLightboxOverlay();
        });
    </script>
</body>
</html>
